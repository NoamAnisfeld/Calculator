<!DOCTYPE html>
<html>
    <head>
        <script src="calculator.js" async defer></script>
    </head>
    <body>
        <h1>Calculator</h1>
        <label>First argument
            <input type="text" id="argument1">
        </label>
        <label>Second argument
            <input type="text" id="argument2">
        </label>

        <button type="button" id="calculate">Calculate</button>
        <section id="calculator-keys">
            <button type="button" data-action="add">+</button>
            <button type="button" data-action="subtract">-</button>
            <button type="button" data-action="multiply">×</button>
            <button type="button" data-action="divide">÷</button>
            <button type="button" data-action="power">x<sup>y</sup></button>
        </section>

        <h2>Output</h2>
        <div id="output"></div>
    </body>
</html>
