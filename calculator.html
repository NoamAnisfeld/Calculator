<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="styles.css">
        <script src="calculator.js" async defer></script>
    </head>
    <body>
        <h1>Calculator</h1>

        <div style="margin-bottom: 3em;">
            <label>Unified input
                <input type="text" id="calculator__input">
            </label>
        </div>

        <label>First argument
            <input type="number" id="argument1">
        </label>
        <label>Second argument
            <input type="number" id="argument2">
        </label>

        <section id="calculator__keys">
            <button type="button" data-action="add">+</button>
            <button type="button" data-action="subtract">-</button>
            <button type="button" data-action="multiply">×</button>
            <button type="button" data-action="divide">÷</button>
            <button type="button" data-action="power">x<sup>y</sup></button>
        </section>

        <h2>Result</h2>
        <div id="calculator__result"></div>
    </body>
</html>
